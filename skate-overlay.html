<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>session.log</title>
<style>
  :root{
    --ink:#fff;
    --dim:rgba(255,255,255,.42);
    --faint:rgba(255,255,255,.14);
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Monaco, "Courier New", monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%; background:#000; color:var(--ink); font-family:var(--mono);}
  body{display:flex; flex-direction:column; overscroll-behavior:none;}

  #stageWrap{
    flex:1 1 auto; min-height:0; position:relative;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  canvas{ max-width:100%; max-height:100%; display:block; }

  #hint{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    color:var(--dim); font-size:13px; letter-spacing:.08em;
    pointer-events:none; transition:opacity .6s; text-align:center; line-height:1.7;
  }

  #ui{
    flex:0 0 auto; border-top:1px solid var(--faint);
    padding:14px 14px calc(14px + env(safe-area-inset-bottom));
    max-height:52vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:#000;
  }
  .row{display:flex; gap:8px; align-items:center; margin-bottom:8px; flex-wrap:wrap;}
  label{ color:var(--dim); font-size:11px; letter-spacing:.1em; text-transform:uppercase; }
  .field{ display:flex; flex-direction:column; gap:4px; flex:1 1 84px; min-width:0; }
  input,select,button{
    font-family:var(--mono); font-size:14px; color:var(--ink);
    background:#000; border:1px solid var(--faint); border-radius:0;
    padding:9px 8px; width:100%; appearance:none; -webkit-appearance:none;
  }
  input:focus,select:focus,button:focus-visible{ outline:1px solid var(--ink); outline-offset:1px; border-color:var(--ink); }
  button{ cursor:pointer; letter-spacing:.06em; }
  button:active{ background:#fff; color:#000; }
  button.wide{ flex:1 1 auto; }
  button[disabled]{ color:var(--faint); border-color:var(--faint); cursor:default; }
  .file{ position:relative; overflow:hidden; }
  .file input[type=file]{ position:absolute; inset:0; opacity:0; }
  #status{ color:var(--dim); font-size:11px; line-height:1.6; white-space:pre-wrap; margin-top:2px; }
  .note{ color:var(--faint); font-size:10px; line-height:1.6; margin-top:10px; }
  .sep{ height:1px; background:var(--faint); margin:12px 0; }
  .hidden{ display:none !important; }

  body.rec #ui{ display:none; }
  body.rec #stageWrap{ background:#000; }

  @media (prefers-reduced-motion: reduce){ #hint{transition:none;} }
</style>
</head>
<body>

<div id="stageWrap">
  <canvas id="stage" width="1080" height="1920"></canvas>
  <div id="hint">GPX / TCX を読み込む</div>
</div>

<div id="ui">

  <div class="row">
    <button class="wide file" type="button">GPX / TCX を開く
      <input type="file" id="file" accept=".gpx,.tcx,.xml,application/gpx+xml,text/xml,application/xml">
    </button>
    <button id="demo" type="button" style="flex:0 0 96px">デモ走行</button>
  </div>

  <div id="status">待機中。ファイルを開くか、デモ走行で見た目を確認。</div>

  <div class="sep"></div>

  <div class="row">
    <div class="field">
      <label for="aspect">画面比</label>
      <select id="aspect">
        <option value="9:16" selected>9:16 縦</option>
        <option value="16:9">16:9 横</option>
        <option value="1:1">1:1</option>
      </select>
    </div>
    <div class="field">
      <label for="corner">配置</label>
      <select id="corner">
        <option value="bl" selected>左下</option>
        <option value="br">右下</option>
        <option value="tl">左上</option>
        <option value="tr">右上</option>
      </select>
    </div>
    <div class="field">
      <label for="dur">再生秒数</label>
      <input id="dur" type="number" inputmode="decimal" value="20" min="2" max="600" step="1">
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label for="temp">気温 °C</label>
      <input id="temp" type="text" inputmode="decimal" placeholder="--">
    </div>
    <div class="field">
      <label for="sky">天気</label>
      <input id="sky" type="text" placeholder="--">
    </div>
    <div class="field" style="flex:0 0 116px">
      <label>&nbsp;</label>
      <button id="wx" type="button" disabled>天気を取得</button>
    </div>
  </div>

  <div class="row">
    <div class="field">
      <label for="model">kcal モデル</label>
      <select id="model">
        <option value="met" selected>MET 5.0</option>
        <option value="keytel">Keytel（心拍）</option>
        <option value="off">出さない</option>
      </select>
    </div>
    <div class="field">
      <label for="kg">体重 kg</label>
      <input id="kg" type="number" inputmode="decimal" value="65" min="20" max="200" step="0.5">
    </div>
    <div class="field keytel-only hidden">
      <label for="age">年齢</label>
      <input id="age" type="number" inputmode="numeric" value="40" min="10" max="99" step="1">
    </div>
    <div class="field keytel-only hidden">
      <label for="sex">式の係数</label>
      <select id="sex">
        <option value="m" selected>男性式</option>
        <option value="f">女性式</option>
      </select>
    </div>
  </div>

  <div class="sep"></div>

  <div class="row">
    <button id="play" class="wide" type="button" disabled>再生</button>
    <button id="rec" type="button" style="flex:0 0 128px" disabled>収録モード</button>
  </div>

  <p class="note">
    kcal は式の出力であって測定値ではない。MET 5.0 はスケボー一括の粗い係数、Keytel は心拍から推定する式で、
    どちらもラン・チャリの定常運動で作られたモデル。表示は est_kcal のまま、# にモデル名を出す。<br><br>
    収録モード → 画面収録を回す → タップで再生 → LumaFusion で上のトラックに置いて
    Frame &amp; Fit のブレンドを Screen に。黒が飛んで線と文字だけ残る。ダブルタップで収録モードを抜ける。
  </p>
</div>

<script>
"use strict";

const $ = s => document.querySelector(s);
const cv = $("#stage"), ctx = cv.getContext("2d");
const hint = $("#hint"), statusEl = $("#status");

const S = {
  pts: [],            // {lat,lon,t,hr,d,kcal}
  t0: 0, tEnd: 0, totalD: 0, hasHr: false, hasTime: false,
  proj: null,
  temp: null, sky: null,
  modelLabel: "MET5.0",
  dur: 20, corner: "bl",
  playing: false, wallStart: 0, p: 0, raf: 0,
  label: "session"
};

/* ---------- parsing ---------- */

function all(root, name){
  const out = [];
  const it = root.getElementsByTagName("*");
  for (let i=0;i<it.length;i++) if (it[i].localName === name) out.push(it[i]);
  return out;
}
function textOf(root, name){
  const e = all(root, name)[0];
  return e ? e.textContent.trim() : null;
}

function parseTrack(text){
  const doc = new DOMParser().parseFromString(text, "application/xml");
  if (doc.getElementsByTagName("parsererror").length)
    throw new Error("XML として壊れてる。中身を確認。");

  let pts = [];

  const trkpts = all(doc.documentElement, "trkpt");
  if (trkpts.length){
    for (const p of trkpts){
      const lat = parseFloat(p.getAttribute("lat"));
      const lon = parseFloat(p.getAttribute("lon"));
      if (!isFinite(lat) || !isFinite(lon)) continue;
      const ts = textOf(p, "time");
      // gpxtpx:hr / hr どちらでも拾う
      let hr = null;
      const hrEl = all(p, "hr")[0];
      if (hrEl) hr = parseFloat(hrEl.textContent);
      pts.push({ lat, lon, t: ts ? Date.parse(ts) : null, hr: isFinite(hr) ? hr : null });
    }
  } else {
    const tps = all(doc.documentElement, "Trackpoint");
    for (const p of tps){
      const lat = parseFloat(textOf(p, "LatitudeDegrees"));
      const lon = parseFloat(textOf(p, "LongitudeDegrees"));
      if (!isFinite(lat) || !isFinite(lon)) continue;
      const ts = textOf(p, "Time");
      const hrEl = all(p, "HeartRateBpm")[0];
      let hr = hrEl ? parseFloat(textOf(hrEl, "Value") ?? hrEl.textContent) : null;
      pts.push({ lat, lon, t: ts ? Date.parse(ts) : null, hr: isFinite(hr) ? hr : null });
    }
  }

  if (pts.length < 2) throw new Error("座標つきの点が足りひん。GPS の入った走行ファイルか確認。");
  return pts;
}

/* ---------- geometry ---------- */

function haversine(a, b){
  const R = 6371000, rad = Math.PI/180;
  const dLat = (b.lat-a.lat)*rad, dLon = (b.lon-a.lon)*rad;
  const la1 = a.lat*rad, la2 = b.lat*rad;
  const h = Math.sin(dLat/2)**2 + Math.cos(la1)*Math.cos(la2)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.min(1, Math.sqrt(h)));
}

function prepare(pts){
  // 時刻の無い点は前後から補間せず、そのまま index 基準に落とす
  const timed = pts.filter(p => p.t !== null && isFinite(p.t));
  S.hasTime = timed.length === pts.length && pts.length > 1;

  if (S.hasTime) pts.sort((a,b) => a.t - b.t);

  // 明らかな飛びを落とす（60km/h 超は GPS のノイズ扱い）
  const clean = [pts[0]];
  for (let i=1;i<pts.length;i++){
    const prev = clean[clean.length-1], cur = pts[i];
    const m = haversine(prev, cur);
    if (S.hasTime){
      const dt = (cur.t - prev.t)/1000;
      if (dt > 0 && m/dt > 16.7) continue;
    } else if (m > 200) continue;
    clean.push(cur);
  }
  if (clean.length < 2) throw new Error("有効な点が残らんかった。");

  let d = 0;
  clean[0].d = 0;
  for (let i=1;i<clean.length;i++){
    d += haversine(clean[i-1], clean[i]);
    clean[i].d = d;
  }

  S.pts = clean;
  S.totalD = d;
  S.t0 = S.hasTime ? clean[0].t : 0;
  S.tEnd = S.hasTime ? clean[clean.length-1].t : (clean.length-1);
  S.hasHr = clean.some(p => p.hr !== null && p.hr > 0);

  // 投影とバウンズ
  const latRef = (Math.min(...clean.map(p=>p.lat)) + Math.max(...clean.map(p=>p.lat)))/2;
  const k = Math.cos(latRef*Math.PI/180);
  let minX=1e9,maxX=-1e9,minY=1e9,maxY=-1e9;
  for (const p of clean){
    p.px = p.lon*k; p.py = -p.lat;
    minX=Math.min(minX,p.px); maxX=Math.max(maxX,p.px);
    minY=Math.min(minY,p.py); maxY=Math.max(maxY,p.py);
  }
  S.proj = { minX, maxX, minY, maxY };

  computeKcal();
}

function computeKcal(){
  const model = $("#model").value;
  const kg = parseFloat($("#kg").value) || 65;
  const age = parseFloat($("#age").value) || 40;
  const male = $("#sex").value === "m";

  let useKeytel = model === "keytel" && S.hasHr && S.hasTime;
  if (model === "keytel" && !useKeytel){
    S.modelLabel = "MET5.0";        // 心拍か時刻が無いので落とす
  } else if (model === "keytel"){
    S.modelLabel = male ? "Keytel/HR/m" : "Keytel/HR/f";
  } else {
    S.modelLabel = "MET5.0";
  }
  if (model === "off"){ S.pts.forEach(p => p.kcal = null); return; }

  let acc = 0, lastHr = null;
  S.pts[0].kcal = 0;
  for (let i=1;i<S.pts.length;i++){
    const a = S.pts[i-1], b = S.pts[i];
    const min = S.hasTime ? (b.t - a.t)/60000 : 0;
    if (useKeytel){
      if (b.hr) lastHr = b.hr;
      const hr = b.hr || a.hr || lastHr;
      if (hr && min > 0){
        const perMin = male
          ? (-55.0969 + 0.6309*hr + 0.1988*kg + 0.2017*age)/4.184
          : (-20.4022 + 0.4472*hr - 0.1263*kg + 0.0740*age)/4.184;
        acc += Math.max(0, perMin) * min;
      }
    } else {
      acc += (5.0 * 3.5 * kg / 200) * Math.max(0, min);
    }
    b.kcal = acc;
  }
}

/* ---------- weather ---------- */

const WMO = {
  0:"clear", 1:"mainly_clear", 2:"partly_cloudy", 3:"overcast",
  45:"fog", 48:"rime_fog", 51:"drizzle", 53:"drizzle", 55:"drizzle",
  56:"freezing_drizzle", 57:"freezing_drizzle",
  61:"rain", 63:"rain", 65:"heavy_rain", 66:"freezing_rain", 67:"freezing_rain",
  71:"snow", 73:"snow", 75:"heavy_snow", 77:"snow_grains",
  80:"showers", 81:"showers", 82:"heavy_showers", 85:"snow_showers", 86:"snow_showers",
  95:"thunderstorm", 96:"thunderstorm_hail", 99:"thunderstorm_hail"
};

async function fetchWeather(){
  if (!S.pts.length || !S.hasTime){
    setStatus("時刻つきの点が無いから天気は引かれへん。手で入れて。");
    return;
  }
  const p0 = S.pts[0];
  const ageDays = (Date.now() - S.t0) / 86400000;
  const day = new Date(S.t0).toISOString().slice(0,10);
  let url;
  if (ageDays > 88){
    url = `https://archive-api.open-meteo.com/v1/archive?latitude=${p0.lat.toFixed(4)}&longitude=${p0.lon.toFixed(4)}`
        + `&start_date=${day}&end_date=${day}&hourly=temperature_2m,weather_code&timezone=UTC`;
  } else {
    const past = Math.max(1, Math.min(92, Math.ceil(ageDays) + 1));
    url = `https://api.open-meteo.com/v1/forecast?latitude=${p0.lat.toFixed(4)}&longitude=${p0.lon.toFixed(4)}`
        + `&hourly=temperature_2m,weather_code&past_days=${past}&forecast_days=1&timezone=UTC`;
  }

  setStatus("天気を取得中…");
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    const times = j.hourly.time.map(t => Date.parse(t + "Z"));
    let bi = 0, bd = Infinity;
    times.forEach((t, i) => { const d = Math.abs(t - S.t0); if (d < bd){ bd = d; bi = i; } });
    const temp = j.hourly.temperature_2m[bi];
    const code = j.hourly.weather_code[bi];
    if (temp === null || temp === undefined) throw new Error("その時刻のデータが無い");
    $("#temp").value = temp.toFixed(1);
    $("#sky").value = WMO[code] ?? ("code_" + code);
    readWeatherInputs();
    setStatus(`天気を取得: ${temp.toFixed(1)}°C / ${$("#sky").value}\n（Open-Meteo。走行開始の座標と時刻に一番近い毎正時の値）`);
    draw(S.p);
  } catch (e){
    setStatus("天気の取得に失敗: " + e.message + "\n手で入れて。");
  }
}

function readWeatherInputs(){
  const t = parseFloat($("#temp").value);
  S.temp = isFinite(t) ? t : null;
  const s = $("#sky").value.trim();
  S.sky = s || null;
}

/* ---------- drawing ---------- */

function setAspect(){
  const a = $("#aspect").value;
  const dim = { "9:16":[1080,1920], "16:9":[1920,1080], "1:1":[1080,1080] }[a];
  cv.width = dim[0]; cv.height = dim[1];
}

function fmtTime(ms){
  const s = Math.max(0, Math.floor(ms/1000));
  const h = Math.floor(s/3600), m = Math.floor(s%3600/60), ss = s%60;
  const pad = n => String(n).padStart(2,"0");
  return `${pad(h)}:${pad(m)}:${pad(ss)}`;
}

function sampleAt(p){
  // p: 0..1 → 現在地点と、そこまでの累積
  const pts = S.pts;
  if (!pts.length) return null;
  const target = S.hasTime ? S.t0 + p*(S.tEnd - S.t0) : p*(pts.length-1);
  let i = 0;
  if (S.hasTime){
    let lo = 0, hi = pts.length-1;
    while (lo < hi){ const mid = (lo+hi)>>1; if (pts[mid].t < target) lo = mid+1; else hi = mid; }
    i = Math.max(0, lo);
  } else {
    i = Math.min(pts.length-1, Math.floor(target));
  }
  const a = pts[Math.max(0,i-1)], b = pts[i];
  let f = 0;
  if (S.hasTime && b.t !== a.t) f = (target - a.t)/(b.t - a.t);
  else if (!S.hasTime) f = target - Math.floor(target);
  f = Math.max(0, Math.min(1, f));

  return {
    i,
    px: a.px + (b.px - a.px)*f,
    py: a.py + (b.py - a.py)*f,
    d:  a.d  + (b.d  - a.d )*f,
    kcal: (a.kcal == null || b.kcal == null) ? null : a.kcal + (b.kcal - a.kcal)*f,
    ms: S.hasTime ? target - S.t0 : (p * 1000 * (pts.length-1)),
    hr: b.hr ?? a.hr ?? null
  };
}

function box(W, H, s){
  const M = 72*s;
  const mapSize = 460*s;
  const lineH = 46*s;
  const lines = 7;
  const textH = lines*lineH;
  const gap = 36*s;
  const blockW = Math.max(mapSize, 640*s);
  const blockH = mapSize + gap + textH;
  const c = S.corner;
  const x = (c === "bl" || c === "tl") ? M : W - M - blockW;
  const y = (c === "tl" || c === "tr") ? M : H - M - blockH - 40*s;
  return { x, y, mapSize, lineH, gap, blockW, blockH, M };
}

function draw(p){
  const W = cv.width, H = cv.height;
  const s = Math.min(W, H)/1080;
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,W,H);
  if (!S.pts.length) return;

  const b = box(W, H, s);
  const cur = sampleAt(p);

  /* --- route --- */
  const pr = S.proj;
  const spanX = Math.max(1e-9, pr.maxX - pr.minX);
  const spanY = Math.max(1e-9, pr.maxY - pr.minY);
  const pad = 26*s;
  const inner = b.mapSize - pad*2;
  const k = Math.min(inner/spanX, inner/spanY);
  const offX = b.x + pad + (inner - spanX*k)/2;
  const offY = b.y + pad + (inner - spanY*k)/2;
  const X = px => offX + (px - pr.minX)*k;
  const Y = py => offY + (py - pr.minY)*k;

  ctx.lineJoin = ctx.lineCap = "round";

  // 走った全体を薄く（Strava の replay と同じ考え方）
  ctx.strokeStyle = "rgba(255,255,255,.22)";
  ctx.lineWidth = 4*s;
  ctx.beginPath();
  S.pts.forEach((q,i) => i ? ctx.lineTo(X(q.px), Y(q.py)) : ctx.moveTo(X(q.px), Y(q.py)));
  ctx.stroke();

  // 現在までを白く
  ctx.strokeStyle = "#fff";
  ctx.lineWidth = 5.5*s;
  ctx.beginPath();
  for (let i=0; i<=cur.i; i++){
    const q = S.pts[i];
    i ? ctx.lineTo(X(q.px), Y(q.py)) : ctx.moveTo(X(q.px), Y(q.py));
  }
  ctx.lineTo(X(cur.px), Y(cur.py));
  ctx.stroke();

  // 先端
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(X(cur.px), Y(cur.py), 9*s, 0, Math.PI*2);
  ctx.fill();

  // 起点
  ctx.strokeStyle = "rgba(255,255,255,.55)";
  ctx.lineWidth = 3*s;
  ctx.beginPath();
  ctx.arc(X(S.pts[0].px), Y(S.pts[0].py), 8*s, 0, Math.PI*2);
  ctx.stroke();

  /* --- log --- */
  const fs = 38*s;
  ctx.font = `${fs}px ${getComputedStyle(document.body).fontFamily}`;
  ctx.textBaseline = "alphabetic";

  const stamp = S.hasTime
    ? new Date(S.t0).toLocaleString("sv-SE").slice(0,16)
    : "--";

  const rows = [];
  rows.push({ txt: `> ${S.label}.log`, key:true });
  rows.push({ txt: `  ts      : ${stamp}` });
  rows.push({ txt: `  dist    : ${(cur.d/1000).toFixed(2)} km` });
  rows.push({ txt: `  time    : ${fmtTime(cur.ms)}` });
  rows.push({ txt: `  temp    : ${S.temp !== null ? S.temp.toFixed(1)+" \u00B0C" : "--"}` });
  rows.push({ txt: `  sky     : ${S.sky ?? "--"}` });
  if (S.hasHr) rows.push({ txt: `  bpm     : ${cur.hr ? Math.round(cur.hr) : "--"}` });
  if (cur.kcal !== null) rows.push({ txt: `  est_kcal: ${Math.round(cur.kcal)}`, cmt: `   # ${S.modelLabel}` });

  let ty = b.y + b.mapSize + b.gap + fs;
  for (const r of rows){
    ctx.fillStyle = r.key ? "rgba(255,255,255,.62)" : "#fff";
    ctx.fillText(r.txt, b.x, ty);
    if (r.cmt){
      const w = ctx.measureText(r.txt).width;
      ctx.fillStyle = "rgba(255,255,255,.34)";
      ctx.fillText(r.cmt, b.x + w, ty);
    }
    ty += b.lineH;
  }

  // カーソル
  const blink = S.playing ? (Math.floor(performance.now()/500) % 2 === 0) : true;
  if (blink){
    ctx.fillStyle = "rgba(255,255,255,.8)";
    ctx.fillRect(b.x + 2*s, ty - fs*0.82, fs*0.55, fs*0.9);
  }
}

/* ---------- playback ---------- */

function play(){
  if (!S.pts.length) return;
  S.dur = Math.max(2, parseFloat($("#dur").value) || 20);
  S.playing = true;
  $("#play").textContent = "停止";
  S.wallStart = performance.now();
  cancelAnimationFrame(S.raf);
  const step = () => {
    const el = (performance.now() - S.wallStart)/1000;
    S.p = Math.min(1, el/S.dur);
    draw(S.p);
    if (S.p < 1 && S.playing) S.raf = requestAnimationFrame(step);
    else stop();
  };
  S.raf = requestAnimationFrame(step);
}
function stop(){
  S.playing = false;
  cancelAnimationFrame(S.raf);
  $("#play").textContent = "再生";
  draw(S.p);
}

/* ---------- demo ---------- */

function demoTrack(){
  const pts = [];
  const lat0 = 34.9012, lon0 = 135.2130;
  const t0 = Date.now() - 40*60000;
  const N = 900;
  for (let i=0;i<N;i++){
    const a = i/N * Math.PI*2;
    const wob = 1 + 0.24*Math.sin(a*3.1) + 0.1*Math.sin(a*7.3);
    pts.push({
      lat: lat0 + 0.0075*wob*Math.sin(a) + 0.0004*Math.sin(a*11),
      lon: lon0 + 0.0098*wob*Math.cos(a) + 0.0005*Math.cos(a*13),
      t: t0 + i*1600,
      hr: Math.round(112 + 16*Math.sin(a*2.2) + 5*Math.sin(a*9))
    });
  }
  return pts;
}

/* ---------- wiring ---------- */

function setStatus(t){ statusEl.textContent = t; }

function loaded(pts, label){
  prepare(pts);
  S.label = label;
  S.p = 0;
  $("#play").disabled = false;
  $("#rec").disabled = false;
  $("#wx").disabled = !S.hasTime;
  hint.style.opacity = 0;
  const km = (S.totalD/1000).toFixed(2);
  const dur = S.hasTime ? fmtTime(S.tEnd - S.t0) : "時刻なし";
  setStatus(
    `読み込み: ${S.pts.length} 点 / ${km} km / ${dur}\n` +
    `心拍: ${S.hasHr ? "あり" : "なし"}` +
    (!S.hasHr && $("#model").value === "keytel" ? "（Keytel は使えんので MET に落とした）" : "")
  );
  draw(0);
}

$("#file").addEventListener("change", async e => {
  const f = e.target.files[0];
  if (!f) return;
  try {
    const text = await f.text();
    loaded(parseTrack(text), f.name.replace(/\.[^.]+$/, "").slice(0,24) || "session");
  } catch (err){
    setStatus("読めへんかった: " + err.message);
  }
  e.target.value = "";
});

$("#demo").addEventListener("click", () => {
  try { loaded(demoTrack(), "demo"); } catch(err){ setStatus(err.message); }
});

$("#wx").addEventListener("click", fetchWeather);
$("#play").addEventListener("click", () => S.playing ? stop() : play());

["#temp","#sky"].forEach(id => $(id).addEventListener("input", () => { readWeatherInputs(); draw(S.p); }));
["#kg","#age"].forEach(id => $(id).addEventListener("input", () => { if (S.pts.length){ computeKcal(); draw(S.p); } }));
$("#sex").addEventListener("change", () => { if (S.pts.length){ computeKcal(); draw(S.p); } });
$("#model").addEventListener("change", () => {
  $$(".keytel-only").forEach(el => el.classList.toggle("hidden", $("#model").value !== "keytel"));
  if (S.pts.length){ computeKcal(); draw(S.p); }
});
function $$(s){ return [...document.querySelectorAll(s)]; }

$("#aspect").addEventListener("change", () => { setAspect(); draw(S.p); });
$("#corner").addEventListener("change", () => { S.corner = $("#corner").value; draw(S.p); });

/* 収録モード */
let lastTap = 0;
$("#rec").addEventListener("click", () => {
  document.body.classList.add("rec");
  hint.textContent = "タップで再生 / ダブルタップで戻る";
  hint.style.opacity = 1;
  setTimeout(() => hint.style.opacity = 0, 2600);
});
$("#stageWrap").addEventListener("click", () => {
  if (!document.body.classList.contains("rec")) return;
  const now = Date.now();
  if (now - lastTap < 320){
    document.body.classList.remove("rec");
    stop();
    lastTap = 0;
    setAspect(); draw(S.p);
    return;
  }
  lastTap = now;
  setTimeout(() => {
    if (lastTap && Date.now() - lastTap >= 320 && document.body.classList.contains("rec")){
      S.p = 0; play();
      lastTap = 0;
    }
  }, 340);
});

setAspect();
draw(0);
</script>
